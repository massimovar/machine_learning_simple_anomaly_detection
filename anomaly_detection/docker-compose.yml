services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - MOSQUITTO_LISTENER=1883 0.0.0.0
      - MOSQUITTO_ALLOW_ANONYMOUS=true
    command:
      - /bin/sh
      - -c
      - |
        cat > /tmp/mosquitto.conf <<EOF
        listener $${MOSQUITTO_LISTENER}
        allow_anonymous $${MOSQUITTO_ALLOW_ANONYMOUS}
        listener 9001 0.0.0.0
        protocol websockets
        EOF
        exec mosquitto -c /tmp/mosquitto.conf
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  detector:
    build:
      context: .
    image: anomaly_detection-detector:local
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=3
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
