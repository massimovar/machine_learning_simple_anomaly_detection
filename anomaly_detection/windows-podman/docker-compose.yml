name: anomaly_detection_windows

services:
  mqtt-broker:
    build:
      context: .
      dockerfile: Dockerfile.mqtt-broker
    image: localhost/anomaly_mqtt_broker:windows-amd64
    platform: linux/amd64
    ports:
      - "${MQTT_HOST_PORT:-1883}:1883"
      - "${MQTT_WS_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  detector:
    build:
      context: ..
      dockerfile: windows-podman/Dockerfile.detector
    image: localhost/anomaly_detector:windows-amd64
    platform: linux/amd64
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=3
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"