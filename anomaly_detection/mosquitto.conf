# ==========================================================================
# mosquitto.conf — Configuration for the containerised Mosquitto broker
# ==========================================================================
#
# This file is volume-mounted into the Mosquitto container so you can
# tweak settings without rebuilding the image.
#
# KEY SETTINGS:
#   listener 1883 0.0.0.0   → accept connections on ALL interfaces
#                              (needed so the detector container AND the
#                               host machine can both reach the broker)
#   allow_anonymous true     → no username/password required
#                              (fine for a demo; disable in production)
# ==========================================================================

# Listen on port 1883 on all network interfaces
listener 1883 0.0.0.0

# Allow clients to connect without credentials
allow_anonymous true
